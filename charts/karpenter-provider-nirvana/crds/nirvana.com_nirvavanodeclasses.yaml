apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nirvavanodeclasses.nirvana.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: nirvana.com
  names:
    kind: NirvanaNodeClass
    listKind: NirvanaNodeClassList
    plural: nirvavanodeclasses
    singular: nirvavanodeclass
    shortNames:
      - nnc
    categories:
      - karpenter
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusterID
                - apiKeySecretRef
              properties:
                clusterID:
                  type: string
                  description: NKS cluster ID to scale pools within.
                apiKeySecretRef:
                  type: object
                  required:
                    - name
                    - key
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                apiEndpoint:
                  type: string
                  description: Override the default Nirvana API endpoint.
                poolSelector:
                  type: object
                  properties:
                    tags:
                      type: array
                      items:
                        type: string
                    poolIDs:
                      type: array
                      items:
                        type: string
                cooldownMultiplier:
                  type: number
                  format: double
                  description: Multiplier applied to provisioning time for cooldown. Defaults to 2.0.
                maxPollDuration:
                  type: string
                  description: Maximum time to poll an operation (e.g. "30m"). Defaults to 30m.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                pools:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      nodeCount:
                        type: integer
                      vcpu:
                        type: integer
                      ramGi:
                        type: integer
                      storageGi:
                        type: integer
                      status:
                        type: string
