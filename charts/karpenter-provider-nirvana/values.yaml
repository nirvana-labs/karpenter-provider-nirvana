replicaCount: 1

image:
  repository: ghcr.io/nirvana-labs/karpenter-provider-nirvana
  tag: latest
  pullPolicy: Always

nirvana:
  clusterID: ""
  apiKeySecretName: nirvana-api-key
  apiKeySecretKey: api-key

serviceAccount:
  create: true
  name: karpenter

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
