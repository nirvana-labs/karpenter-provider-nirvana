apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "karpenter.fullname" . }}
  labels:
    {{- include "karpenter.labels" . | nindent 4 }}
rules:
  # Karpenter core CRDs (sigs.k8s.io/karpenter v1.9.0)
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools", "nodepools/status", "nodeclaims", "nodeclaims/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools/finalizers", "nodeclaims/finalizers"]
    verbs: ["update"]

  # Nirvana provider NodeClass
  - apiGroups: ["nirvanalabs.io"]
    resources: ["nirvananodeclasses", "nirvananodeclasses/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["nirvanalabs.io"]
    resources: ["nirvananodeclasses/finalizers"]
    verbs: ["update"]

  # Core k8s reads — cluster-scoped resources Karpenter inspects for scheduling.
  # Note: cluster-wide reads on configmaps / secrets / serviceaccounts are
  # deliberately omitted. The API key Secret is resolved by kubelet via
  # secretKeyRef, not by the controller, so no controller-side read of it is
  # needed. If Karpenter core ever requires namespaced Secret/ConfigMap access
  # (e.g. image-pull-secret resolution for pending pods), add a narrowly
  # scoped Role rather than re-broadening this ClusterRole.
  - apiGroups: [""]
    resources: ["pods", "nodes", "persistentvolumes", "persistentvolumeclaims", "replicationcontrollers", "namespaces"]
    verbs: ["get", "list", "watch"]

  # Node lifecycle (drain, taint, terminate)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # Event emission
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Workload controllers — needed for scheduling decisions
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

  # Storage — VolumeAttachment-aware disruption
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["get", "list", "watch"]

  # Scheduling primitives
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Validating admission policies (Karpenter v1+ feature)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "karpenter.fullname" . }}
  labels:
    {{- include "karpenter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "karpenter.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "karpenter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
