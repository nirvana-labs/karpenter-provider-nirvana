version: "3"

vars:
  GO: go
  GOFLAGS: ""
  BINARY: karpenter-provider-nirvana
  LICENSE_IGNORES: >-
    --ignore=github.com/nirvana-labs
  # Pinned to match sigs.k8s.io/karpenter version in go.mod. Bump when the
  # library bumps and re-run `task vendor-crds`.
  KARPENTER_LIBRARY_VERSION: v1.9.0
  KARPENTER_CRDS_DIR: charts/karpenter-provider-nirvana/crds
  GOBIN:
    sh: |
      if [ -n "$(go env GOBIN)" ]; then
        echo "$(go env GOBIN)"
      else
        echo "$(go env GOPATH)/bin"
      fi

tasks:
  install-lint:
    desc: Install golangci-lint
    cmds:
      - "{{.GO}} install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@8f3b0c7ed018e57905fbd873c697e0b1ede605a5"

  install-license-check:
    desc: Install license check
    cmds:
      - "{{.GO}} install github.com/google/go-licenses/v2@3e084b0caf710f7bfead967567539214f598c0a2"

  install-security-check:
    desc: Install security check
    cmds:
      - "{{.GO}} install github.com/securego/gosec/v2/cmd/gosec@f6760311e8a3db06e3d2d7e9817874dadcd34a25"

  install-gotestsum:
    desc: Install gotestsum
    cmds:
      - "{{.GO}} install gotest.tools/gotestsum@c4a0df2e75a225d979a444342dd3db752b53619f"

  install-goreleaser:
    desc: Install goreleaser
    cmds:
      - "{{.GO}} install github.com/goreleaser/goreleaser/v2@fd20dc1995cd5eb3fded997d6613c7f694ab448b"

  install-tools:
    desc: Install all tools
    deps:
      - install-lint
      - install-license-check
      - install-security-check
      - install-gotestsum
      - install-goreleaser

  build:
    desc: Build the project
    cmds:
      - "{{.GO}} build {{.GOFLAGS}} -o bin/{{.BINARY}} ./cmd/controller"

  vet:
    desc: Vet the project
    cmds:
      - "{{.GO}} vet {{.GOFLAGS}} ./..."

  fmt:
    desc: Format the project
    cmds:
      - "{{.GO}} fmt ./..."

  lint:
    desc: Run golangci-lint
    cmds:
      - "{{.GOBIN}}/golangci-lint run"

  license-check:
    desc: Run license check
    cmds:
      - "{{.GOBIN}}/go-licenses check ./... --disallowed_types=forbidden,restricted {{.LICENSE_IGNORES}}"

  security-check:
    desc: Run security check
    cmds:
      - "{{.GOBIN}}/gosec ./..."

  release:check:
    desc: Validate .goreleaser.yaml
    cmds:
      - "{{.GOBIN}}/goreleaser check"

  release:snapshot:
    desc: Run goreleaser in snapshot mode (builds artifacts locally, does not push)
    cmds:
      - "{{.GOBIN}}/goreleaser release --snapshot --clean --skip=publish"

  vendor-crds:
    desc: Re-vendor karpenter.sh core CRDs from upstream at KARPENTER_LIBRARY_VERSION
    cmds:
      - |
        curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/karpenter/{{.KARPENTER_LIBRARY_VERSION}}/pkg/apis/crds/karpenter.sh_nodepools.yaml" \
          -o {{.KARPENTER_CRDS_DIR}}/karpenter.sh_nodepools.yaml
      - |
        curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/karpenter/{{.KARPENTER_LIBRARY_VERSION}}/pkg/apis/crds/karpenter.sh_nodeclaims.yaml" \
          -o {{.KARPENTER_CRDS_DIR}}/karpenter.sh_nodeclaims.yaml
      - echo "Vendored karpenter.sh CRDs at {{.KARPENTER_LIBRARY_VERSION}}"

  helm:lint:
    desc: Lint the chart
    cmds:
      - helm lint charts/karpenter-provider-nirvana/

  helm:template:
    desc: Render the chart with a sample clusterID for sanity checking
    cmds:
      - helm template karpenter charts/karpenter-provider-nirvana/ --set nirvana.clusterID=00000000-0000-0000-0000-000000000000
